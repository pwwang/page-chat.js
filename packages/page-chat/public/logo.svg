<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brand gradient: blue → violet -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#39b6ff"/>
      <stop offset="100%" stop-color="#bd45fb"/>
    </linearGradient>

    <!-- Glow gradient for background -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#1a0a3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020014" stop-opacity="1"/>
    </radialGradient>

    <!-- Stroke gradient for bubble outline -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#39b6ff"/>
      <stop offset="100%" stop-color="#bd45fb"/>
    </linearGradient>

    <!-- Bubble fill (very subtle tint) -->
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#39b6ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#bd45fb" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Glow filter for the bubble stroke -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGlow)"/>

  <!-- Subtle ambient glow blobs -->
  <ellipse cx="170" cy="180" rx="140" ry="120" fill="#39b6ff" opacity="0.07"/>
  <ellipse cx="350" cy="330" rx="130" ry="110" fill="#bd45fb" opacity="0.07"/>

  <!-- Speech bubble body
       A rounded rectangle with a tail cut out at bottom-left.
       Drawn as a single path for clean gradient stroke. -->
  <g filter="url(#glowFilter)">
    <!-- Bubble fill -->
    <path d="
      M 156 120
      Q 100 120 100 176
      L 100 308
      Q 100 364 156 364
      L 218 364
      L 186 422
      L 272 364
      L 356 364
      Q 412 364 412 308
      L 412 176
      Q 412 120 356 120
      Z
    " fill="url(#bubbleFill)" stroke="url(#strokeGrad)" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- Page lines inside the bubble — three horizontal rules representing a document/page -->
  <!-- Line 1 (long) -->
  <line x1="158" y1="196" x2="354" y2="196" stroke="url(#brandGrad)" stroke-width="14" stroke-linecap="round" opacity="0.95"/>
  <!-- Line 2 (long) -->
  <line x1="158" y1="242" x2="354" y2="242" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
  <!-- Line 3 (short — like a paragraph end) -->
  <line x1="158" y1="288" x2="278" y2="288" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.35"/>
</svg>
